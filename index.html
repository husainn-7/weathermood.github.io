<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nightwatch — Skies</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Rajdhani:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#eef2f8; --ink-soft:#aab6c8; --line:rgba(180,195,215,.22);
    --signal:#f0bf57; --glow:rgba(240,191,87,.4); --card:rgba(10,16,26,.42);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:"Rajdhani",system-ui,sans-serif;color:var(--ink);background:#0a1019;overflow:hidden}
  #scene{position:fixed;inset:0;z-index:0;display:block}
  .grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.045;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>")}
  .vin{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(130% 120% at 50% 38%,transparent 52%,rgba(0,0,0,.5) 100%)}

  .stage{position:relative;z-index:10;height:100%;display:flex;flex-direction:column;padding:clamp(16px,3vw,40px);max-width:760px;margin:0 auto}
  header{display:flex;justify-content:space-between;align-items:center}
  .brand{display:flex;align-items:baseline;gap:.5rem;font-family:"Oswald";font-weight:700;font-size:1.4rem;letter-spacing:.16em;text-transform:uppercase}
  .brand i{width:9px;height:9px;border-radius:50%;background:var(--signal);box-shadow:0 0 12px var(--glow);transform:translateY(-2px)}
  .brand small{font-family:"Oswald";font-weight:400;font-size:.6rem;letter-spacing:.3em;color:var(--ink-soft)}
  .unit{display:flex;border:1px solid var(--line);border-radius:20px;overflow:hidden;background:var(--card);backdrop-filter:blur(8px)}
  .unit button{font:inherit;font-family:"Oswald";font-weight:600;font-size:.82rem;letter-spacing:.05em;background:none;border:none;color:var(--ink-soft);padding:6px 14px;cursor:pointer}
  .unit button.on{background:var(--signal);color:#0a0f17}

  .search{display:flex;gap:8px;margin-top:clamp(18px,4vw,30px)}
  .search input{flex:1;font:inherit;font-size:1.05rem;color:var(--ink);background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:13px 16px;backdrop-filter:blur(8px)}
  .search input::placeholder{color:var(--ink-soft)}
  .search input:focus-visible{outline:2px solid var(--signal);outline-offset:1px;border-color:var(--signal)}
  .search button{font-family:"Oswald";font-weight:600;letter-spacing:.08em;text-transform:uppercase;border:none;cursor:pointer;
    background:var(--signal);color:#0a0f17;border-radius:12px;padding:0 18px;transition:background .15s,box-shadow .15s}
  .search button:hover{background:#ffce6a;box-shadow:0 0 18px var(--glow)}
  .search button.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line);font-size:1.1rem;padding:0 14px}
  .search button:focus-visible{outline:2px solid var(--ink);outline-offset:2px}

  .panel{flex:1;display:flex;flex-direction:column;justify-content:center;gap:18px}
  .status{font-family:"Oswald";letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);font-size:.86rem;text-align:center}
  .status b{color:var(--signal)}

  .now{display:none}
  .now.show{display:block;animation:rise .5s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .place{font-family:"Oswald";font-weight:500;font-size:clamp(1.1rem,3.4vw,1.5rem);letter-spacing:.06em}
  .place span{color:var(--ink-soft);font-weight:300}
  .head{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-top:6px}
  .temp{font-family:"Oswald";font-weight:300;font-variant-numeric:tabular-nums;font-size:clamp(4rem,18vw,7rem);line-height:.9;text-shadow:0 0 36px rgba(238,242,248,.14)}
  .temp sup{font-size:.3em;vertical-align:super;color:var(--ink-soft)}
  .cond{display:flex;flex-direction:column;gap:4px}
  .cond .ic{width:54px;height:54px;color:var(--signal)}
  .cond .lbl{font-family:"Oswald";font-weight:500;letter-spacing:.08em;text-transform:uppercase;font-size:1rem}
  .stats{display:flex;gap:26px;flex-wrap:wrap;margin-top:14px;font-family:"Space Mono",monospace}
  .stats div{display:flex;flex-direction:column}
  .stats .k{font-family:"Oswald";font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:3px}
  .stats .v{font-weight:700;font-size:1.05rem}

  .forecast{display:flex;gap:8px;margin-top:22px;overflow-x:auto;padding-bottom:4px}
  .fc{flex:1 0 86px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 8px;text-align:center;backdrop-filter:blur(8px)}
  .fc .d{font-family:"Oswald";font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft)}
  .fc .fi{width:30px;height:30px;margin:7px auto;color:var(--signal)}
  .fc .hi{font-family:"Space Mono";font-weight:700;font-size:.92rem}
  .fc .lo{font-family:"Space Mono";font-size:.78rem;color:var(--ink-soft)}

  footer{font-family:"Oswald";font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-soft);text-align:center;padding-top:10px}
  footer a{color:var(--signal);text-decoration:none}
  @media (max-width:480px){.stats{gap:18px}}
</style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div class="grain"></div>
  <div class="vin"></div>

  <div class="stage">
    <header>
      <div class="brand"><i></i>Nightwatch <small>skies</small></div>
      <div class="unit"><button id="uC" class="on">°C</button><button id="uF">°F</button></div>
    </header>

    <div class="search">
      <input id="q" placeholder="Search a city…" autocomplete="off" />
      <button id="go">Search</button>
      <button id="loc" class="ghost" title="Use my location" aria-label="Use my location">⌖</button>
    </div>

    <div class="panel">
      <div class="status" id="status">Loading the skies…</div>
      <div class="now" id="now">
        <div class="place" id="place"></div>
        <div class="head">
          <div class="temp" id="temp"></div>
          <div class="cond"><div class="ic" id="ic"></div><div class="lbl" id="lbl"></div></div>
        </div>
        <div class="stats">
          <div><span class="k">Feels like</span><span class="v" id="feels"></span></div>
          <div><span class="k">Humidity</span><span class="v" id="hum"></span></div>
          <div><span class="k">Wind</span><span class="v" id="wind"></span></div>
        </div>
        <div class="forecast" id="forecast"></div>
      </div>
    </div>

    <footer>Live data via <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a> · Nightwatch</footer>
  </div>

<script>
(() => {
  "use strict";
  const reduce = matchMedia("(prefers-reduced-motion:reduce)").matches;
  const DPR = Math.min(devicePixelRatio||1,2);
  const $=id=>document.getElementById(id);
  const R=(a,b)=>a+Math.random()*(b-a), lerp=(a,b,t)=>a+(b-a)*t, clamp=(v,a,b)=>v<a?a:v>b?b:v;

  /* ---------- WMO code → label + scene ---------- */
  function codeInfo(c){
    if(c===0) return {l:"Clear",s:"clear"};
    if(c===1) return {l:"Mainly clear",s:"clear"};
    if(c===2) return {l:"Partly cloudy",s:"partly"};
    if(c===3) return {l:"Overcast",s:"cloudy"};
    if(c===45||c===48) return {l:"Fog",s:"fog"};
    if(c>=51&&c<=57) return {l:"Drizzle",s:"rain"};
    if(c>=61&&c<=67) return {l:"Rain",s:"rain"};
    if(c>=71&&c<=77) return {l:"Snow",s:"snow"};
    if(c>=80&&c<=82) return {l:"Rain showers",s:"rain"};
    if(c>=85&&c<=86) return {l:"Snow showers",s:"snow"};
    if(c>=95) return {l:"Thunderstorm",s:"storm"};
    return {l:"—",s:"cloudy"};
  }
  function icon(s,day){
    const C='stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"';
    const cloud=`<path ${C} d="M7 18h10a4 4 0 0 0 .5-7.97A6 6 0 0 0 6 11a3.5 3.5 0 0 0 1 7z"/>`;
    if(s==="clear") return day
      ? `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.5" ${C}/><g ${C}><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.4 1.4M17.6 17.6L19 19M19 5l-1.4 1.4M6.4 17.6L5 19"/></g></svg>`
      : `<svg viewBox="0 0 24 24"><path ${C} d="M20 14.5A7 7 0 1 1 10 5a5.5 5.5 0 0 0 10 9.5z"/></svg>`;
    if(s==="partly") return `<svg viewBox="0 0 24 24"><circle cx="8" cy="8" r="3" ${C}/>${cloud}</svg>`;
    if(s==="cloudy"||s==="fog") return `<svg viewBox="0 0 24 24">${cloud}</svg>`;
    if(s==="rain") return `<svg viewBox="0 0 24 24">${cloud}<g ${C}><path d="M9 20l-1 2M13 20l-1 2M17 20l-1 2"/></g></svg>`;
    if(s==="snow") return `<svg viewBox="0 0 24 24">${cloud}<g ${C}><path d="M9 20v.01M13 20v.01M17 20v.01"/></g></svg>`;
    if(s==="storm") return `<svg viewBox="0 0 24 24">${cloud}<path ${C} d="M13 18l-3 4h4l-3 4"/></svg>`;
    return `<svg viewBox="0 0 24 24">${cloud}</svg>`;
  }

  /* ====================================================================
     SCENE ENGINE
  ==================================================================== */
  const cv=$("scene"), ctx=cv.getContext("2d");
  let W,H,diag, tt=0;
  let buildings=[], windows=[], stars=[], clouds=[], rain=[], snow=[];
  let flags={day:true, stars:false, sun:false, moon:false, rain:0, snow:0, clouds:2, fog:0, storm:false, windAng:0.2};
  let flash=0, lightAt=R(5,11);
  let skyTop=[10,16,25], skyBot=[13,24,39], tgtTop=[10,16,25], tgtBot=[13,24,39];

  const PALETTE = {
    clearDay:[[74,131,196],[150,190,225]],
    clearNight:[[4,7,13],[13,24,39]],
    partlyDay:[[96,140,186],[170,195,218]],
    partlyNight:[[8,13,22],[20,32,48]],
    cloudyDay:[[110,124,142],[160,174,190]],
    cloudyNight:[[12,16,24],[28,36,48]],
    fogDay:[[120,128,138],[168,176,186]],
    fogNight:[[26,30,38],[52,58,68]],
    rainDay:[[70,84,100],[110,124,140]],
    rainNight:[[8,12,20],[24,32,44]],
    snowDay:[[140,152,168],[196,206,218]],
    snowNight:[[16,22,32],[40,50,64]],
    stormDay:[[40,46,56],[70,78,90]],
    stormNight:[[8,10,16],[24,28,36]]
  };

  function resize(){
    W=cv.width=Math.floor(innerWidth*DPR); H=cv.height=Math.floor(innerHeight*DPR);
    cv.style.width=innerWidth+"px"; cv.style.height=innerHeight+"px"; diag=Math.hypot(W,H);
    buildSkyline(); makeStars(); applyParticleCounts();
  }
  function buildSkyline(){
    buildings=[]; windows=[]; const g=H;
    let x=-40;
    while(x<W+40){ const w=R(W*0.03,W*0.07),h=R(H*0.10,H*0.26),y=g-h; buildings.push({x,y,w,h,far:true}); x+=w-R(2,12)*DPR; }
    x=-40;
    while(x<W+40){ const w=R(W*0.05,W*0.12),h=R(H*0.20,H*0.44),y=g-h; buildings.push({x,y,w,h,far:false});
      const gx=18*DPR,gy=24*DPR;
      for(let wx=x+8*DPR;wx<x+w-8*DPR;wx+=gx) for(let wy=y+10*DPR;wy<g-6*DPR;wy+=gy)
        if(Math.random()<0.16) windows.push({x:wx,y:wy,base:R(0.25,0.85),ph:R(0,6.28),sp:R(0.4,1.3)});
      x+=w-R(2,10)*DPR; }
  }
  function makeStars(){ stars=[]; for(let i=0;i<90;i++) stars.push({x:R(0,W),y:R(0,H*0.55),r:R(0.4,1.4)*DPR,ph:R(0,6.28),sp:R(0.3,1.2)}); }
  function applyParticleCounts(){
    clouds=[]; for(let i=0;i<flags.clouds;i++) clouds.push({x:R(0,W),y:R(H*0.04,H*0.4),r:R(W*0.12,W*0.28),a:R(0.05,0.13),sp:R(0.04,0.14)*DPR*(1+flags.windAng*2)});
    rain=[]; const rn=Math.round(flags.rain*W*H/(120000*DPR));
    for(let i=0;i<rn;i++) rain.push({x:R(0,W),y:R(0,H),l:R(9,20)*DPR,sp:R(7,12)*DPR,a:R(0.08,0.22)});
    snow=[]; const sn=Math.round(flags.snow*W*H/(160000*DPR));
    for(let i=0;i<sn;i++) snow.push({x:R(0,W),y:R(0,H),r:R(1.2,3)*DPR,sp:R(1,2.6)*DPR,ph:R(0,6.28),dr:R(0.3,1)*DPR});
  }
  function setScene(s, day, windKmh){
    flags.day=day; const wind=clamp((windKmh||8)/40,0.06,0.6);
    flags.windAng = wind; flags.stars=false; flags.sun=false; flags.moon=false;
    flags.rain=0; flags.snow=0; flags.clouds=1; flags.fog=0; flags.storm=false;
    let pal;
    if(s==="clear"){ pal=day?PALETTE.clearDay:PALETTE.clearNight; flags.clouds=0; if(day)flags.sun=true; else {flags.moon=true;flags.stars=true;} }
    else if(s==="partly"){ pal=day?PALETTE.partlyDay:PALETTE.partlyNight; flags.clouds=3; if(day)flags.sun=true; else {flags.moon=true;flags.stars=true;} }
    else if(s==="cloudy"){ pal=day?PALETTE.cloudyDay:PALETTE.cloudyNight; flags.clouds=6; }
    else if(s==="fog"){ pal=day?PALETTE.fogDay:PALETTE.fogNight; flags.clouds=3; flags.fog=1; }
    else if(s==="rain"){ pal=day?PALETTE.rainDay:PALETTE.rainNight; flags.clouds=5; flags.rain=1; }
    else if(s==="snow"){ pal=day?PALETTE.snowDay:PALETTE.snowNight; flags.clouds=4; flags.snow=1; }
    else if(s==="storm"){ pal=day?PALETTE.stormDay:PALETTE.stormNight; flags.clouds=6; flags.rain=1.4; flags.storm=true; }
    else { pal=day?PALETTE.cloudyDay:PALETTE.cloudyNight; flags.clouds=5; }
    tgtTop=pal[0].slice(); tgtBot=pal[1].slice();
    applyParticleCounts();
  }

  const rgb=a=>`rgb(${a[0]|0},${a[1]|0},${a[2]|0})`;
  function drawSky(){
    for(let i=0;i<3;i++){ skyTop[i]=lerp(skyTop[i],tgtTop[i],0.04); skyBot[i]=lerp(skyBot[i],tgtBot[i],0.04); }
    const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,rgb(skyTop)); g.addColorStop(1,rgb(skyBot));
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  }
  function drawStars(){ if(!flags.stars)return; for(const s of stars){ const tw=reduce?1:0.5+0.5*Math.sin(tt*s.sp+s.ph);
    ctx.globalAlpha=0.15+0.6*tw; ctx.fillStyle="#eef2f8"; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,6.283); ctx.fill(); } ctx.globalAlpha=1; }
  function drawSun(){ if(!flags.sun)return; const x=W*0.78,y=H*0.2,r=Math.min(W,H)*0.06;
    let g=ctx.createRadialGradient(x,y,r*0.5,x,y,r*3.4); g.addColorStop(0,"rgba(255,224,150,0.4)"); g.addColorStop(1,"rgba(255,224,150,0)");
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r*3.4,0,6.283); ctx.fill();
    g=ctx.createRadialGradient(x,y,0,x,y,r); g.addColorStop(0,"#fff7e0"); g.addColorStop(1,"#ffd368");
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,6.283); ctx.fill(); }
  function drawMoon(){ if(!flags.moon)return; const x=W*0.78,y=H*0.18,r=Math.min(W,H)*0.055;
    let g=ctx.createRadialGradient(x,y,r*0.6,x,y,r*2.6); g.addColorStop(0,"rgba(200,214,236,0.2)"); g.addColorStop(1,"rgba(200,214,236,0)");
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r*2.6,0,6.283); ctx.fill();
    g=ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.2,x,y,r); g.addColorStop(0,"#eef2f8"); g.addColorStop(1,"#8a93a6");
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,6.283); ctx.fill(); }
  function drawClouds(){ if(!clouds.length)return; ctx.globalCompositeOperation="lighter";
    for(const c of clouds){ c.x+=c.sp; if(c.x-c.r>W)c.x=-c.r;
      const tint = flags.storm? "70,76,88" : flags.day? "210,220,232" : "90,104,130";
      const g=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,c.r); g.addColorStop(0,`rgba(${tint},${c.a})`); g.addColorStop(1,`rgba(${tint},0)`);
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,6.283); ctx.fill(); }
    ctx.globalCompositeOperation="source-over"; }
  function drawSkyline(){
    for(const b of buildings){ if(!b.far)continue; ctx.fillStyle= flags.day? "rgba(40,52,68,0.6)":"#101b29"; ctx.fillRect(b.x,b.y,b.w,b.h); }
    for(const b of buildings){ if(b.far)continue; ctx.fillStyle= flags.day? "#0d141f":"#04070d"; ctx.fillRect(b.x,b.y,b.w,b.h);
      ctx.fillStyle="rgba(120,140,170,0.25)"; ctx.fillRect(b.x,b.y,b.w,1.5*DPR); }
    const nightBoost = flags.day?0.22:1;
    for(const w of windows){ const fl=reduce?w.base:w.base*(0.6+0.4*Math.sin(tt*w.sp+w.ph));
      ctx.fillStyle=`rgba(240,196,106,${clamp(fl*nightBoost+flash*0.7,0,1)})`; ctx.fillRect(w.x,w.y,3*DPR,5*DPR); }
  }
  function drawRain(){ if(!rain.length)return; const ax=flags.windAng*4;
    ctx.lineWidth=1.1*DPR; ctx.strokeStyle="rgba(170,190,220,0.5)";
    for(const d of rain){ ctx.globalAlpha=d.a/0.22*0.6; ctx.beginPath(); ctx.moveTo(d.x,d.y); ctx.lineTo(d.x-ax*d.l*0.12,d.y+d.l); ctx.stroke();
      d.y+=d.sp; d.x-=ax*d.sp*0.12; if(d.y>H){d.y=-d.l;d.x=R(0,W);} } ctx.globalAlpha=1; }
  function drawSnow(){ if(!snow.length)return; ctx.fillStyle="rgba(235,242,250,0.85)";
    for(const f of snow){ f.ph+=0.02; f.x+=Math.sin(f.ph)*f.dr*0.4; f.y+=f.sp;
      if(f.y>H){f.y=-4;f.x=R(0,W);} if(f.x>W)f.x=0; if(f.x<0)f.x=W;
      ctx.globalAlpha=0.6+0.4*Math.sin(f.ph); ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,6.283); ctx.fill(); } ctx.globalAlpha=1; }
  function drawFog(){ if(!flags.fog)return; ctx.globalCompositeOperation="lighter";
    for(let i=0;i<3;i++){ const y=H*(0.4+i*0.18)+Math.sin(tt*0.3+i)*20*DPR;
      const g=ctx.createLinearGradient(0,y-80*DPR,0,y+80*DPR); g.addColorStop(0,"rgba(180,188,200,0)"); g.addColorStop(0.5,"rgba(180,188,200,0.10)"); g.addColorStop(1,"rgba(180,188,200,0)");
      ctx.fillStyle=g; ctx.fillRect(0,y-80*DPR,W,160*DPR); } ctx.globalCompositeOperation="source-over"; }
  function vignetteFlash(){ if(flash>0.001){ ctx.globalCompositeOperation="lighter"; ctx.fillStyle=`rgba(200,212,235,${flash*0.2})`; ctx.fillRect(0,0,W,H); ctx.globalCompositeOperation="source-over"; } }

  function loop(){
    tt+=0.016;
    if(!reduce && flags.storm){ lightAt-=0.016; if(lightAt<=0){flash=1;lightAt=R(3,9);} }
    flash*=0.9; if(flash<0.001)flash=0;
    drawSky(); drawStars(); drawSun(); drawMoon(); drawClouds(); drawFog();
    drawSkyline(); drawRain(); drawSnow(); vignetteFlash();
    requestAnimationFrame(loop);
  }

  /* ====================================================================
     DATA
  ==================================================================== */
  let unit = (()=>{try{return localStorage.getItem("nw_unit")||"c";}catch(e){return "c";}})();
  let last=null; // {tempC,feelsC,hum,windKmh,info,day,daily}

  const cToF=c=>c*9/5+32;
  const setUnit=u=>{ unit=u; try{localStorage.setItem("nw_unit",u);}catch(e){} $("uC").classList.toggle("on",u==="c"); $("uF").classList.toggle("on",u==="f"); if(last)paint(); };
  $("uC").addEventListener("click",()=>setUnit("c")); $("uF").addEventListener("click",()=>setUnit("f"));

  function showStatus(msg){ $("status").innerHTML=msg; $("status").style.display="block"; $("now").classList.remove("show"); }
  function tShow(c){ return Math.round(unit==="c"?c:cToF(c))+"°"; }

  async function geocode(name){
    const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=1&language=en&format=json`);
    const j=await r.json(); if(!j.results||!j.results.length) return null; return j.results[0];
  }
  async function getWeather(lat,lon){
    const u=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`+
      `&current=temperature_2m,apparent_temperature,relative_humidity_2m,is_day,weather_code,wind_speed_10m`+
      `&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=5`;
    const r=await fetch(u); return r.json();
  }
  async function load(name){
    showStatus("Searching…");
    try{
      const g=await geocode(name);
      if(!g){ showStatus("No city by that name. Check the spelling or try a nearby one."); return; }
      await loadCoords(g.latitude,g.longitude,g.name,[g.admin1,g.country].filter(Boolean).join(", "));
    }catch(e){ showStatus("Couldn't reach the weather service. Check your connection and try again."); }
  }
  async function loadCoords(lat,lon,name,sub){
    showStatus("Reading the skies…");
    try{
      const d=await getWeather(lat,lon); const c=d.current;
      const info=codeInfo(c.weather_code), day=c.is_day===1;
      last={tempC:c.temperature_2m,feelsC:c.apparent_temperature,hum:c.relative_humidity_2m,windKmh:c.wind_speed_10m,info,day,
            place:name,sub,daily:d.daily};
      setScene(info.s, day, c.wind_speed_10m);
      paint();
    }catch(e){ showStatus("Couldn't load that location. Try another."); }
  }

  function paint(){
    if(!last) return;
    $("status").style.display="none"; $("now").classList.add("show");
    $("place").innerHTML=`${last.place} <span>${last.sub||""}</span>`;
    $("temp").innerHTML=`${Math.round(unit==="c"?last.tempC:cToF(last.tempC))}<sup>°${unit.toUpperCase()}</sup>`;
    $("ic").innerHTML=icon(last.info.s,last.day); $("lbl").textContent=last.info.l;
    $("feels").textContent=tShow(last.feelsC);
    $("hum").textContent=Math.round(last.hum)+"%";
    $("wind").textContent= unit==="c" ? Math.round(last.windKmh)+" km/h" : Math.round(last.windKmh*0.621)+" mph";
    // forecast
    const f=$("forecast"); f.innerHTML=""; const dl=last.daily;
    for(let i=0;i<dl.time.length;i++){
      const date=new Date(dl.time[i]+"T00:00"); const inf=codeInfo(dl.weather_code[i]);
      const day=i===0?"Today":date.toLocaleDateString("en-US",{weekday:"short"});
      const el=document.createElement("div"); el.className="fc";
      el.innerHTML=`<div class="d">${day}</div><div class="fi">${icon(inf.s,true)}</div>`+
        `<div class="hi">${tShow(dl.temperature_2m_max[i])}</div><div class="lo">${tShow(dl.temperature_2m_min[i])}</div>`;
      f.appendChild(el);
    }
  }

  /* ---------- events ---------- */
  $("go").addEventListener("click",()=>{ const v=$("q").value.trim(); if(v)load(v); });
  $("q").addEventListener("keydown",e=>{ if(e.key==="Enter"){ const v=$("q").value.trim(); if(v)load(v); } });
  $("loc").addEventListener("click",()=>{
    if(!navigator.geolocation){ showStatus("Location isn't available here. Search a city instead."); return; }
    showStatus("Finding you…");
    navigator.geolocation.getCurrentPosition(
      p=>loadCoords(p.coords.latitude,p.coords.longitude,"Your location",""),
      ()=>showStatus("Couldn't get your location. Search a city instead.")
    );
  });

  /* ---------- boot ---------- */
  setUnit(unit);
  resize(); addEventListener("resize",resize);
  requestAnimationFrame(loop);
  $("q").value="Kuala Lumpur"; load("Kuala Lumpur");
})();
</script>
</body>
</html>
