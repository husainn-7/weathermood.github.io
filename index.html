<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nightwatch — Skies over Gotham</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Rajdhani:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#eef2f8; --ink-soft:#9aa7bb; --line:rgba(150,168,195,.20);
    --signal:#f0bf57; --glow:rgba(240,191,87,.4); --card:rgba(9,14,24,.5);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:"Rajdhani",system-ui,sans-serif;color:var(--ink);background:#05080f;overflow-x:hidden}
  #scene{position:fixed;inset:0;z-index:0;display:block}
  .grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.05;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>")}
  .vin{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(130% 120% at 50% 36%,transparent 50%,rgba(0,0,0,.58) 100%)}

  .stage{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;padding:clamp(16px,3vw,40px);max-width:780px;margin:0 auto}
  header{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  .brand{display:flex;align-items:baseline;gap:.5rem;font-family:"Oswald";font-weight:700;font-size:1.4rem;letter-spacing:.16em;text-transform:uppercase}
  .brand i{width:9px;height:9px;border-radius:50%;background:var(--signal);box-shadow:0 0 12px var(--glow);transform:translateY(-2px)}
  .brand small{font-family:"Oswald";font-weight:400;font-size:.58rem;letter-spacing:.3em;color:var(--ink-soft)}
  .unit{display:flex;border:1px solid var(--line);border-radius:20px;overflow:hidden;background:var(--card);backdrop-filter:blur(8px)}
  .unit button{font-family:"Oswald";font-weight:600;font-size:.78rem;letter-spacing:.04em;background:none;border:none;color:var(--ink-soft);padding:6px 13px;cursor:pointer;transition:background .15s,color .15s}
  .unit button.on{background:var(--signal);color:#0a0f17}

  .search{position:relative;display:flex;gap:8px;margin-top:clamp(16px,4vw,28px)}
  .search input{flex:1;font:inherit;font-size:1.05rem;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 16px;backdrop-filter:blur(8px)}
  .search input::placeholder{color:var(--ink-soft)}
  .search input:focus-visible{outline:2px solid var(--signal);outline-offset:1px;border-color:var(--signal)}
  .search button{font-family:"Oswald";font-weight:600;letter-spacing:.08em;text-transform:uppercase;border:none;cursor:pointer;background:var(--signal);color:#0a0f17;border-radius:12px;padding:0 18px;transition:background .15s,box-shadow .15s}
  .search button:hover{background:#ffce6a;box-shadow:0 0 18px var(--glow)}
  .search button.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line);font-size:1.2rem;padding:0 14px}
  .suggest{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:20;background:#0a111d;border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.5);display:none}
  .suggest.show{display:block}
  .suggest button{display:block;width:100%;text-align:left;background:none;border:none;color:var(--ink);font:inherit;font-size:.98rem;padding:11px 16px;cursor:pointer;border-radius:0}
  .suggest button:hover,.suggest button.hl{background:rgba(240,191,87,.12)}
  .suggest button span{color:var(--ink-soft);font-size:.85rem}

  .chips{display:flex;gap:8px;margin-top:12px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
  .chips button{flex:0 0 auto;font-family:"Oswald";font-weight:500;font-size:.74rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);background:var(--card);border:1px solid var(--line);border-radius:20px;padding:7px 14px;cursor:pointer;backdrop-filter:blur(6px);transition:color .15s,border-color .15s}
  .chips button:hover,.chips button.on{color:var(--signal);border-color:var(--signal-dim,#b8923c)}

  .panel{flex:1;display:flex;flex-direction:column;justify-content:center;gap:16px;padding:18px 0}
  .status{font-family:"Oswald";letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);font-size:.84rem;text-align:center}
  .now{display:none}
  .now.show{display:block;animation:rise .5s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .place{font-family:"Oswald";font-weight:500;font-size:clamp(1.1rem,3.4vw,1.5rem);letter-spacing:.05em}
  .place span{color:var(--ink-soft);font-weight:300}
  .head{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-top:6px}
  .temp{font-family:"Oswald";font-weight:300;font-variant-numeric:tabular-nums;font-size:clamp(3.8rem,17vw,6.8rem);line-height:.9;text-shadow:0 0 36px rgba(238,242,248,.14)}
  .temp sup{font-size:.3em;vertical-align:super;color:var(--ink-soft);margin-left:.06em}
  .cond{display:flex;flex-direction:column;gap:4px}
  .cond .ic{width:52px;height:52px;color:var(--signal)}
  .cond .lbl{font-family:"Oswald";font-weight:500;letter-spacing:.08em;text-transform:uppercase;font-size:1rem}
  .stats{display:flex;gap:24px;flex-wrap:wrap;margin-top:14px;font-family:"Space Mono",monospace}
  .stats div{display:flex;flex-direction:column}
  .stats .k{font-family:"Oswald";font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:3px}
  .stats .v{font-weight:700;font-size:1rem}

  .forecast{display:flex;gap:8px;margin-top:22px;overflow-x:auto;padding-bottom:4px}
  .fc{flex:1 0 84px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 8px;text-align:center;backdrop-filter:blur(8px)}
  .fc .d{font-family:"Oswald";font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft)}
  .fc .fi{width:28px;height:28px;margin:7px auto;color:var(--signal)}
  .fc .hi{font-family:"Space Mono";font-weight:700;font-size:.9rem}
  .fc .lo{font-family:"Space Mono";font-size:.76rem;color:var(--ink-soft)}

  footer{font-family:"Oswald";font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-soft);text-align:center;padding-top:10px}
  footer a{color:var(--signal);text-decoration:none}
</style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div class="grain"></div><div class="vin"></div>

  <div class="stage">
    <header>
      <div class="brand"><i></i>Nightwatch <small>skies over gotham</small></div>
      <div class="unit"><button id="uC" class="on">°C</button><button id="uF">°F</button><button id="uK">K</button></div>
    </header>

    <div class="search">
      <input id="q" placeholder="Search any city…" autocomplete="off" />
      <button id="go">Search</button>
      <button id="loc" class="ghost" title="Use my location" aria-label="Use my location">⌖</button>
      <div class="suggest" id="suggest"></div>
    </div>
    <div class="chips" id="chips"></div>

    <div class="panel">
      <div class="status" id="status">Reading the skies…</div>
      <div class="now" id="now">
        <div class="place" id="place"></div>
        <div class="head">
          <div class="temp" id="temp"></div>
          <div class="cond"><div class="ic" id="ic"></div><div class="lbl" id="lbl"></div></div>
        </div>
        <div class="stats">
          <div><span class="k">Feels like</span><span class="v" id="feels"></span></div>
          <div><span class="k">Humidity</span><span class="v" id="hum"></span></div>
          <div><span class="k">Wind</span><span class="v" id="wind"></span></div>
          <div><span class="k">Sunrise</span><span class="v" id="sr"></span></div>
          <div><span class="k">Sunset</span><span class="v" id="ss"></span></div>
        </div>
        <div class="forecast" id="forecast"></div>
      </div>
    </div>

    <footer>Live data via <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a> · Nightwatch</footer>
  </div>

<script>
(() => {
  "use strict";
  const reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
  const DPR=Math.min(devicePixelRatio||1,2);
  const $=id=>document.getElementById(id);
  const R=(a,b)=>a+Math.random()*(b-a), lerp=(a,b,t)=>a+(b-a)*t, clamp=(v,a,b)=>v<a?a:v>b?b:v;

  function codeInfo(c){
    if(c===0)return{l:"Clear",s:"clear"}; if(c===1)return{l:"Mainly clear",s:"clear"};
    if(c===2)return{l:"Partly cloudy",s:"partly"}; if(c===3)return{l:"Overcast",s:"cloudy"};
    if(c===45||c===48)return{l:"Fog",s:"fog"};
    if(c>=51&&c<=57)return{l:"Drizzle",s:"rain"}; if(c>=61&&c<=67)return{l:"Rain",s:"rain"};
    if(c>=71&&c<=77)return{l:"Snow",s:"snow"}; if(c>=80&&c<=82)return{l:"Rain showers",s:"rain"};
    if(c>=85&&c<=86)return{l:"Snow showers",s:"snow"}; if(c>=95)return{l:"Thunderstorm",s:"storm"};
    return{l:"Cloudy",s:"cloudy"};
  }
  function icon(s,day){
    const C='stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"';
    const cloud=`<path ${C} d="M7 18h10a4 4 0 0 0 .5-7.97A6 6 0 0 0 6 11a3.5 3.5 0 0 0 1 7z"/>`;
    if(s==="clear")return day?`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.5" ${C}/><g ${C}><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.4 1.4M17.6 17.6L19 19M19 5l-1.4 1.4M6.4 17.6L5 19"/></g></svg>`:`<svg viewBox="0 0 24 24"><path ${C} d="M20 14.5A7 7 0 1 1 10 5a5.5 5.5 0 0 0 10 9.5z"/></svg>`;
    if(s==="partly")return`<svg viewBox="0 0 24 24"><circle cx="8" cy="8" r="3" ${C}/>${cloud}</svg>`;
    if(s==="cloudy"||s==="fog")return`<svg viewBox="0 0 24 24">${cloud}</svg>`;
    if(s==="rain")return`<svg viewBox="0 0 24 24">${cloud}<g ${C}><path d="M9 20l-1 2M13 20l-1 2M17 20l-1 2"/></g></svg>`;
    if(s==="snow")return`<svg viewBox="0 0 24 24">${cloud}<g ${C}><path d="M9 20v.01M13 20v.01M17 20v.01"/></g></svg>`;
    if(s==="storm")return`<svg viewBox="0 0 24 24">${cloud}<path ${C} d="M13 18l-3 4h4l-3 4"/></svg>`;
    return`<svg viewBox="0 0 24 24">${cloud}</svg>`;
  }

  /* ================= SCENE (Gotham, noir grade) ================= */
  const cv=$("scene"), ctx=cv.getContext("2d");
  let W,H,diag,tt=0, src={x:0,y:0};
  let buildings=[],windows=[],stars=[],clouds=[],rain=[],snow=[],bats=[];
  let flags={day:false,stars:false,sun:false,moon:false,rain:0,snow:0,clouds:3,fog:0,storm:false,wind:0.2};
  let flash=0,lightAt=R(5,11);
  let skyTop=[8,12,20],skyBot=[18,26,40],tgtTop=[8,12,20],tgtBot=[18,26,40];

  // all palettes desaturated + dark = perpetual Gotham
  const P={
    clearDay:[[40,56,78],[78,96,118]], clearNight:[[4,7,13],[14,24,38]],
    partlyDay:[[44,56,72],[84,98,116]], partlyNight:[[8,13,22],[22,32,46]],
    cloudyDay:[[42,48,58],[78,86,98]],  cloudyNight:[[10,14,20],[26,32,42]],
    fogDay:[[54,60,68],[96,102,110]],   fogNight:[[22,26,32],[46,52,60]],
    rainDay:[[32,40,50],[64,74,86]],    rainNight:[[6,10,16],[22,30,42]],
    snowDay:[[66,76,90],[118,128,142]], snowNight:[[16,22,32],[42,52,66]],
    stormDay:[[26,30,38],[52,58,68]],   stormNight:[[5,8,14],[20,24,32]]
  };

  function resize(){
    W=cv.width=Math.floor(innerWidth*DPR); H=cv.height=Math.floor(innerHeight*DPR);
    cv.style.width=innerWidth+"px"; cv.style.height=innerHeight+"px"; diag=Math.hypot(W,H);
    buildSkyline(); stars=[]; for(let i=0;i<90;i++)stars.push({x:R(0,W),y:R(0,H*0.55),r:R(0.4,1.4)*DPR,ph:R(0,6.28),sp:R(0.3,1.2)});
    if(bats.length===0) for(let i=0;i<6;i++) spawnBat(true);
    applyCounts();
  }
  function buildSkyline(){
    buildings=[];windows=[];const g=H;let x=-40;
    while(x<W+40){const w=R(W*0.03,W*0.07),h=R(H*0.10,H*0.24),y=g-h;buildings.push({x,y,w,h,far:true});x+=w-R(2,12)*DPR;}
    x=-40;
    while(x<W+40){const w=R(W*0.05,W*0.12),h=R(H*0.20,H*0.44),y=g-h;buildings.push({x,y,w,h});
      const gx=18*DPR,gy=24*DPR;
      for(let wx=x+8*DPR;wx<x+w-8*DPR;wx+=gx)for(let wy=y+10*DPR;wy<g-6*DPR;wy+=gy)
        if(Math.random()<0.16)windows.push({x:wx,y:wy,base:R(0.25,0.85),ph:R(0,6.28),sp:R(0.4,1.3)});
      x+=w-R(2,10)*DPR;}
    // landmark + signal source
    const lw=W*0.09,lx=W*0.70,lh=H*0.55,ly=g-lh;
    buildings.push({x:lx,y:ly,w:lw,h:lh,landmark:true});
    src={x:lx+lw/2,y:ly};
  }
  function applyCounts(){
    clouds=[];for(let i=0;i<flags.clouds;i++)clouds.push({x:R(0,W),y:R(H*0.04,H*0.4),r:R(W*0.12,W*0.28),a:R(0.05,0.12),sp:R(0.04,0.14)*DPR*(1+flags.wind*2)});
    rain=[];const rn=Math.round(flags.rain*W*H/(120000*DPR));
    for(let i=0;i<rn;i++)rain.push({x:R(0,W),y:R(0,H),l:R(9,20)*DPR,sp:R(7,12)*DPR,a:R(0.08,0.22)});
    snow=[];const sn=Math.round(flags.snow*W*H/(160000*DPR));
    for(let i=0;i<sn;i++)snow.push({x:R(0,W),y:R(0,H),r:R(1.2,3)*DPR,sp:R(1,2.6)*DPR,ph:R(0,6.28),dr:R(0.3,1)*DPR});
  }
  function spawnBat(any){const dir=Math.random()>.5?1:-1;bats.push({x:any?R(0,W):(dir>0?-50:W+50),y:R(0.05,0.34)*H,vx:dir*R(0.4,1.2)*DPR,s:R(0.6,1.5)*DPR,ph:R(0,6.28),dir});}
  function setScene(s,day,windKmh){
    flags.day=day; flags.wind=clamp((windKmh||8)/40,0.06,0.6);
    flags.stars=false;flags.sun=false;flags.moon=false;flags.rain=0;flags.snow=0;flags.clouds=2;flags.fog=0;flags.storm=false;
    let pal;
    if(s==="clear"){pal=day?P.clearDay:P.clearNight;flags.clouds=0;if(day)flags.sun=true;else{flags.moon=true;flags.stars=true;}}
    else if(s==="partly"){pal=day?P.partlyDay:P.partlyNight;flags.clouds=3;if(day)flags.sun=true;else{flags.moon=true;flags.stars=true;}}
    else if(s==="cloudy"){pal=day?P.cloudyDay:P.cloudyNight;flags.clouds=6;}
    else if(s==="fog"){pal=day?P.fogDay:P.fogNight;flags.clouds=3;flags.fog=1;}
    else if(s==="rain"){pal=day?P.rainDay:P.rainNight;flags.clouds=5;flags.rain=1;}
    else if(s==="snow"){pal=day?P.snowDay:P.snowNight;flags.clouds=4;flags.snow=1;}
    else if(s==="storm"){pal=day?P.stormDay:P.stormNight;flags.clouds=6;flags.rain=1.4;flags.storm=true;}
    else{pal=day?P.cloudyDay:P.cloudyNight;flags.clouds=5;}
    tgtTop=pal[0].slice();tgtBot=pal[1].slice();applyCounts();
  }

  const rgb=a=>`rgb(${a[0]|0},${a[1]|0},${a[2]|0})`;
  function drawSky(){for(let i=0;i<3;i++){skyTop[i]=lerp(skyTop[i],tgtTop[i],0.04);skyBot[i]=lerp(skyBot[i],tgtBot[i],0.04);}
    const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,rgb(skyTop));g.addColorStop(1,rgb(skyBot));ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    const p=ctx.createRadialGradient(W*0.7,H,0,W*0.7,H,H*0.7);p.addColorStop(0,"rgba(60,44,20,0.3)");p.addColorStop(1,"rgba(60,44,20,0)");ctx.fillStyle=p;ctx.fillRect(0,0,W,H);}
  function drawStars(){if(!flags.stars)return;for(const s of stars){const tw=reduce?1:0.5+0.5*Math.sin(tt*s.sp+s.ph);ctx.globalAlpha=0.15+0.55*tw;ctx.fillStyle="#eef2f8";ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.283);ctx.fill();}ctx.globalAlpha=1;}
  function drawSun(){if(!flags.sun)return;const x=W*0.8,y=H*0.2,r=Math.min(W,H)*0.055;
    let g=ctx.createRadialGradient(x,y,r*0.5,x,y,r*3.6);g.addColorStop(0,"rgba(230,210,160,0.28)");g.addColorStop(1,"rgba(230,210,160,0)");ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r*3.6,0,6.283);ctx.fill();
    g=ctx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,"#f3ead0");g.addColorStop(1,"#cdb985");ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,6.283);ctx.fill();}
  function drawMoon(){if(!flags.moon)return;const x=W*0.8,y=H*0.17,r=Math.min(W,H)*0.05;
    let g=ctx.createRadialGradient(x,y,r*0.6,x,y,r*2.6);g.addColorStop(0,"rgba(200,214,236,0.18)");g.addColorStop(1,"rgba(200,214,236,0)");ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r*2.6,0,6.283);ctx.fill();
    g=ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.2,x,y,r);g.addColorStop(0,"#eef2f8");g.addColorStop(1,"#878fa0");ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,6.283);ctx.fill();}
  function drawClouds(){if(!clouds.length)return;ctx.globalCompositeOperation="lighter";
    for(const c of clouds){c.x+=c.sp;if(c.x-c.r>W)c.x=-c.r;const tint=flags.storm?"60,66,78":flags.day?"150,160,175":"80,94,118";
      const g=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,c.r);g.addColorStop(0,`rgba(${tint},${c.a})`);g.addColorStop(1,`rgba(${tint},0)`);ctx.fillStyle=g;ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,6.283);ctx.fill();}
    ctx.globalCompositeOperation="source-over";}
  function drawBeam(){
    const ang=-Math.PI/2+Math.sin(tt*0.18)*0.30;
    const L=diag*1.3,px=Math.cos(ang+Math.PI/2),py=Math.sin(ang+Math.PI/2);
    const fx=src.x+Math.cos(ang)*L,fy=src.y+Math.sin(ang)*L,bH=11*DPR,fH=85*DPR;
    ctx.globalCompositeOperation="lighter";
    const g=ctx.createLinearGradient(src.x,src.y,fx,fy);
    g.addColorStop(0,"rgba(245,228,180,0.26)");g.addColorStop(0.6,"rgba(240,205,140,0.06)");g.addColorStop(1,"rgba(240,205,140,0)");
    ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(src.x+px*bH,src.y+py*bH);ctx.lineTo(src.x-px*bH,src.y-py*bH);ctx.lineTo(fx-px*fH,fy-py*fH);ctx.lineTo(fx+px*fH,fy+py*fH);ctx.closePath();ctx.fill();
    const o=ctx.createRadialGradient(src.x,src.y,0,src.x,src.y,16*DPR);o.addColorStop(0,"#fff6dd");o.addColorStop(0.4,"rgba(240,191,87,0.8)");o.addColorStop(1,"rgba(240,191,87,0)");ctx.fillStyle=o;ctx.beginPath();ctx.arc(src.x,src.y,16*DPR,0,6.283);ctx.fill();
    ctx.globalCompositeOperation="source-over";
  }
  function drawSkyline(){
    for(const b of buildings){if(!b.far)continue;ctx.fillStyle=flags.day?"rgba(38,48,62,0.7)":"#101b29";ctx.fillRect(b.x,b.y,b.w,b.h);}
    for(const b of buildings){if(b.far)continue;ctx.fillStyle=flags.day?"#0c121c":"#04070d";ctx.fillRect(b.x,b.y,b.w,b.h);
      ctx.fillStyle="rgba(120,140,170,0.25)";ctx.fillRect(b.x,b.y,b.w,1.5*DPR);
      if(b.landmark){ctx.fillStyle=flags.day?"#0a0f18":"#03060b";
        ctx.fillRect(b.x+b.w*0.2,b.y-b.h*0.07,b.w*0.6,b.h*0.07);
        ctx.fillRect(b.x+b.w/2-2*DPR,b.y-b.h*0.2,4*DPR,b.h*0.13);
        const bl=0.4+0.6*Math.abs(Math.sin(tt*2.6));ctx.fillStyle=`rgba(255,90,77,${reduce?1:bl})`;ctx.beginPath();ctx.arc(b.x+b.w/2,b.y-b.h*0.2,3.4*DPR,0,6.283);ctx.fill();}
    }
    const boost=flags.day?0.22:1;
    for(const w of windows){const fl=reduce?w.base:w.base*(0.6+0.4*Math.sin(tt*w.sp+w.ph));ctx.fillStyle=`rgba(240,196,106,${clamp(fl*boost+flash*0.7,0,1)})`;ctx.fillRect(w.x,w.y,3*DPR,5*DPR);}
  }
  function drawBats(){
    for(const b of bats){b.x+=b.vx;b.ph+=0.26;b.y+=Math.sin(b.ph*0.5)*0.3*DPR;
      if(b.x<-60)b.x=W+60;if(b.x>W+60)b.x=-60;
      const fl=0.45+Math.abs(Math.sin(b.ph))*1.2;
      ctx.save();ctx.translate(b.x,b.y);ctx.scale(b.s*b.dir,b.s);ctx.fillStyle="rgba(6,9,14,.9)";
      ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(-7,-5*fl,-15,-1);ctx.quadraticCurveTo(-9,2,-6,7);ctx.quadraticCurveTo(-4,1,0,4);ctx.quadraticCurveTo(4,1,6,7);ctx.quadraticCurveTo(9,2,15,-1);ctx.quadraticCurveTo(7,-5*fl,0,0);ctx.closePath();ctx.fill();ctx.restore();}
  }
  function drawRain(){if(!rain.length)return;const ax=flags.wind*4;ctx.lineWidth=1.1*DPR;ctx.strokeStyle="rgba(170,190,220,0.5)";
    for(const d of rain){ctx.globalAlpha=d.a/0.22*0.6;ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x-ax*d.l*0.12,d.y+d.l);ctx.stroke();d.y+=d.sp;d.x-=ax*d.sp*0.12;if(d.y>H){d.y=-d.l;d.x=R(0,W);}}ctx.globalAlpha=1;}
  function drawSnow(){if(!snow.length)return;ctx.fillStyle="rgba(235,242,250,0.85)";
    for(const f of snow){f.ph+=0.02;f.x+=Math.sin(f.ph)*f.dr*0.4;f.y+=f.sp;if(f.y>H){f.y=-4;f.x=R(0,W);}if(f.x>W)f.x=0;if(f.x<0)f.x=W;ctx.globalAlpha=0.6+0.4*Math.sin(f.ph);ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,6.283);ctx.fill();}ctx.globalAlpha=1;}
  function drawFog(){if(!flags.fog)return;ctx.globalCompositeOperation="lighter";
    for(let i=0;i<3;i++){const y=H*(0.4+i*0.18)+Math.sin(tt*0.3+i)*20*DPR;const g=ctx.createLinearGradient(0,y-80*DPR,0,y+80*DPR);g.addColorStop(0,"rgba(180,188,200,0)");g.addColorStop(0.5,"rgba(180,188,200,0.1)");g.addColorStop(1,"rgba(180,188,200,0)");ctx.fillStyle=g;ctx.fillRect(0,y-80*DPR,W,160*DPR);}ctx.globalCompositeOperation="source-over";}
  function flashLayer(){if(flash>0.001){ctx.globalCompositeOperation="lighter";ctx.fillStyle=`rgba(200,212,235,${flash*0.2})`;ctx.fillRect(0,0,W,H);ctx.globalCompositeOperation="source-over";}}

  function loop(){tt+=0.016;
    if(!reduce&&flags.storm){lightAt-=0.016;if(lightAt<=0){flash=1;lightAt=R(3,9);}}flash*=0.9;if(flash<0.001)flash=0;
    drawSky();drawStars();drawSun();drawMoon();drawClouds();drawBeam();drawFog();
    if(!reduce)drawBats();else drawBats();
    drawSkyline();drawRain();drawSnow();flashLayer();
    requestAnimationFrame(loop);}

  /* ================= DATA + UI ================= */
  let unit=(()=>{try{return localStorage.getItem("nw_unit")||"c";}catch(e){return "c";}})();
  let last=null;
  const cToF=c=>c*9/5+32;
  function tempVal(c){return Math.round(unit==="c"?c:unit==="f"?cToF(c):c+273.15);}
  function tempSup(){return unit==="k"?"K":"°"+unit.toUpperCase();}
  function tempStr(c){return tempVal(c)+(unit==="k"?" K":"°");}
  function fmtClock(iso){if(!iso)return"—";const t=iso.split("T")[1]||"";let[h,m]=t.split(":").map(Number);const ap=h>=12?"PM":"AM";h=h%12||12;return`${h}:${String(m||0).padStart(2,"0")} ${ap}`;}

  function setUnit(u){unit=u;try{localStorage.setItem("nw_unit",u);}catch(e){}["c","f","k"].forEach(x=>$("u"+x.toUpperCase()).classList.toggle("on",x===u));if(last)paint();}
  $("uC").onclick=()=>setUnit("c");$("uF").onclick=()=>setUnit("f");$("uK").onclick=()=>setUnit("k");

  function status(m){$("status").innerHTML=m;$("status").style.display="block";$("now").classList.remove("show");}

  async function geocode(name,count){const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=${count||1}&language=en&format=json`);const j=await r.json();return j.results||[];}
  async function getWeather(lat,lon){const u=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,relative_humidity_2m,is_day,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset&timezone=auto&forecast_days=5`;const r=await fetch(u);return r.json();}

  async function load(name){hideSuggest();status("Searching…");
    try{const g=await geocode(name,1);if(!g.length){status("No city by that name. Check the spelling or try a nearby one.");return;}
      const c=g[0];await loadCoords(c.latitude,c.longitude,c.name,[c.admin1,c.country].filter(Boolean).join(", "));
    }catch(e){status("Couldn't reach the weather service. Check your connection and try again.");}}
  async function loadCoords(lat,lon,name,sub){status("Reading the skies over "+name+"…");
    try{const d=await getWeather(lat,lon),c=d.current,info=codeInfo(c.weather_code),day=c.is_day===1;
      last={tempC:c.temperature_2m,feelsC:c.apparent_temperature,hum:c.relative_humidity_2m,windKmh:c.wind_speed_10m,info,day,place:name,sub,daily:d.daily};
      setScene(info.s,day,c.wind_speed_10m);paint();
      $("q").value=name;
    }catch(e){status("Couldn't load that location. Try another.");}}

  function paint(){if(!last)return;$("status").style.display="none";$("now").classList.add("show");
    $("place").innerHTML=`${last.place} <span>${last.sub||""}</span>`;
    $("temp").innerHTML=`${tempVal(last.tempC)}<sup>${tempSup()}</sup>`;
    $("ic").innerHTML=icon(last.info.s,last.day);$("lbl").textContent=last.info.l;
    $("feels").textContent=tempStr(last.feelsC);
    $("hum").textContent=Math.round(last.hum)+"%";
    $("wind").textContent=unit==="f"?Math.round(last.windKmh*0.621)+" mph":Math.round(last.windKmh)+" km/h";
    $("sr").textContent=fmtClock(last.daily.sunrise&&last.daily.sunrise[0]);
    $("ss").textContent=fmtClock(last.daily.sunset&&last.daily.sunset[0]);
    const f=$("forecast");f.innerHTML="";const dl=last.daily;
    for(let i=0;i<dl.time.length;i++){const date=new Date(dl.time[i]+"T00:00"),inf=codeInfo(dl.weather_code[i]);
      const day=i===0?"Today":date.toLocaleDateString("en-US",{weekday:"short"});
      const el=document.createElement("div");el.className="fc";
      el.innerHTML=`<div class="d">${day}</div><div class="fi">${icon(inf.s,true)}</div><div class="hi">${tempStr(dl.temperature_2m_max[i])}</div><div class="lo">${tempStr(dl.temperature_2m_min[i])}</div>`;
      f.appendChild(el);}
    // mark active chip
    document.querySelectorAll(".chips button").forEach(b=>b.classList.toggle("on",b.dataset.q===last.place));
  }

  /* search suggestions */
  const sg=$("suggest");let sgItems=[],sgHl=-1,debounce;
  function hideSuggest(){sg.classList.remove("show");sg.innerHTML="";sgItems=[];sgHl=-1;}
  function showSuggest(list){sgItems=list;sgHl=-1;sg.innerHTML="";if(!list.length){hideSuggest();return;}
    list.forEach((c,i)=>{const b=document.createElement("button");b.innerHTML=`${c.name} <span>${[c.admin1,c.country].filter(Boolean).join(", ")}</span>`;
      b.onclick=()=>loadCoords(c.latitude,c.longitude,c.name,[c.admin1,c.country].filter(Boolean).join(", "));sg.appendChild(b);});
    sg.classList.add("show");}
  $("q").addEventListener("input",()=>{const v=$("q").value.trim();clearTimeout(debounce);if(v.length<2){hideSuggest();return;}
    debounce=setTimeout(async()=>{try{const list=await geocode(v,5);if($("q").value.trim().length>=2)showSuggest(list);}catch(e){}},250);});
  $("q").addEventListener("keydown",e=>{
    if(e.key==="ArrowDown"&&sgItems.length){e.preventDefault();sgHl=(sgHl+1)%sgItems.length;hl();}
    else if(e.key==="ArrowUp"&&sgItems.length){e.preventDefault();sgHl=(sgHl-1+sgItems.length)%sgItems.length;hl();}
    else if(e.key==="Enter"){const v=$("q").value.trim();if(sgHl>=0&&sgItems[sgHl]){const c=sgItems[sgHl];loadCoords(c.latitude,c.longitude,c.name,[c.admin1,c.country].filter(Boolean).join(", "));}else if(v)load(v);}
    else if(e.key==="Escape")hideSuggest();});
  function hl(){[...sg.children].forEach((b,i)=>b.classList.toggle("hl",i===sgHl));}
  document.addEventListener("click",e=>{if(!e.target.closest(".search"))hideSuggest();});
  $("go").onclick=()=>{const v=$("q").value.trim();if(v)load(v);};
  $("loc").onclick=()=>{if(!navigator.geolocation){status("Location isn't available here. Search a city instead.");return;}
    status("Finding you…");navigator.geolocation.getCurrentPosition(p=>loadCoords(p.coords.latitude,p.coords.longitude,"Your location",""),()=>status("Couldn't get your location. Search a city instead."));};

  /* city presets */
  const CITIES=["Kuala Lumpur","Chicago","New York","London","Tokyo","Dubai","Reykjavik","Sydney"];
  const chips=$("chips");
  CITIES.forEach(c=>{const b=document.createElement("button");b.textContent=c;b.dataset.q=c;b.onclick=()=>load(c);chips.appendChild(b);});

  /* boot */
  setUnit(unit);resize();addEventListener("resize",resize);requestAnimationFrame(loop);
  load("Kuala Lumpur");
})();
</script>
</body>
</html>
